name: Python CI

on:
  push:
    branches:
      - main
    paths:
      - 'llmfit-python/**'
  pull_request:
    branches:
      - main
    paths:
      - 'llmfit-python/**'
    types:
      - opened
      - synchronize
      - reopened

jobs:
  test:
    name: Python Tests
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            rust_target: x86_64-unknown-linux-gnu
            binary_name: llmfit
            archive_ext: tar.gz
          - os: macos-latest
            rust_target: aarch64-apple-darwin
            binary_name: llmfit
            archive_ext: tar.gz
          - os: windows-latest
            rust_target: x86_64-pc-windows-msvc
            binary_name: llmfit.exe
            archive_ext: zip

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0

      - name: Download and verify release binary
        id: fetch-binary
        shell: bash
        run: |
          LATEST_TAG=$(curl -fsSL "https://api.github.com/repos/AlexsJones/llmfit/releases/latest" \
            | jq -r '.tag_name')
          VERSION="${LATEST_TAG#v}"
          TAG="${LATEST_TAG}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

          ASSET="llmfit-${TAG}-${{ matrix.rust_target }}"
          ARCHIVE="${ASSET}.${{ matrix.archive_ext }}"
          BASE_URL="https://github.com/AlexsJones/llmfit/releases/download/${TAG}"

          EXPECTED=$(curl -fsSL "${BASE_URL}/${ARCHIVE}.sha256" | awk '{print $1}')
          if command -v sha256sum >/dev/null 2>&1; then
            ACTUAL=$(curl -fsSL "${BASE_URL}/${ARCHIVE}" | tee "${ARCHIVE}" | sha256sum | awk '{print $1}')
          else
            ACTUAL=$(curl -fsSL "${BASE_URL}/${ARCHIVE}" | tee "${ARCHIVE}" | shasum -a 256 | awk '{print $1}')
          fi

          if [ "${ACTUAL}" != "${EXPECTED}" ]; then
            echo "Checksum mismatch for ${ARCHIVE}: expected ${EXPECTED}, got ${ACTUAL}"
            exit 1
          fi
          echo "Checksum OK for ${ARCHIVE}"

          if [ "${{ matrix.archive_ext }}" = "tar.gz" ]; then
            tar -xzf "${ARCHIVE}"
          else
            tar -xf "${ARCHIVE}"
          fi

          DEST="target/${{ matrix.rust_target }}/release"
          mkdir -p "${DEST}"
          cp "${ASSET}/${{ matrix.binary_name }}" "${DEST}/${{ matrix.binary_name }}"
          chmod +x "${DEST}/${{ matrix.binary_name }}"

      - name: Run Python tests
        env:
          LLMFIT_VERSION: ${{ steps.fetch-binary.outputs.version }}
        run: uv run --no-editable pytest -vv
        working-directory: llmfit-python

  lint:
    name: Python Lint & Typecheck
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0

      - name: Ruff lint
        run: uv run --only-group=dev ruff check .
        working-directory: llmfit-python

      - name: Ruff format check
        run: uv run --only-group=dev ruff format --check .
        working-directory: llmfit-python

      - name: Type check
        run: uv run --only-group=dev ty check .
        working-directory: llmfit-python
